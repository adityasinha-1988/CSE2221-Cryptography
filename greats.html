<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryptography Hall of Fame</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#0a0f1a]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- SVG Icons ---
        const QuoteIcon = () => (
          <svg viewBox="0 0 24 24" fill="currentColor" className="w-6 h-6 text-indigo-400 opacity-60 shrink-0 mt-1">
            <path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z" />
          </svg>
        );

        const UserIcon = () => (
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-12 h-12 text-slate-500">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        );

        const TopicIcon = () => (
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 mr-3 text-cyan-400 shrink-0">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
          </svg>
        );

        const ImpactIcon = () => (
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 mr-3 text-emerald-400 shrink-0">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
          </svg>
        );

        // --- Data Structure ---
        const pioneersData = [
          {
            category: "The Perspective",
            items: [
              {
                name: "Carl Sagan",
                wikiTerm: "Carl_Sagan",
                url: "https://en.wikipedia.org/wiki/Carl_Sagan",
                topic: "The Pale Blue Dot",
                context: "Setting the scale. Our place in the universe and the fundamental human drive to protect information.",
                quote: "Look again at that dot. That's here. That's home. That's us."
              }
            ]
          },
          {
            category: "The Ancient Foundations",
            items: [
              {
                name: "Euclid",
                wikiTerm: "Euclid",
                url: "https://en.wikipedia.org/wiki/Euclid",
                topic: "Euclidean & Extended Euclidean Algorithm",
                context: "Established the mathematical foundation required to compute the Modulo Inverse, crucial for generating the RSA private key (d).",
                quote: "There is no royal road to geometry."
              },
              {
                name: "Eratosthenes",
                wikiTerm: "Eratosthenes",
                url: "https://en.wikipedia.org/wiki/Eratosthenes",
                topic: "Sieve of Eratosthenes",
                context: "Created the first systematic algorithm for finding prime numbers. This remains the conceptual foundation for RSA prime generation."
              },
              {
                name: "Sun Tzu (Mathematician)",
                wikiTerm: "Sunzi_Suanjing",
                url: "https://en.wikipedia.org/wiki/Sunzi_Suanjing",
                topic: "Chinese Remainder Theorem (CRT)",
                context: "Originated in the Sun Tzu Suanjing. This mathematical theorem is used today to accelerate real-world RSA decryption by roughly 4x."
              },
              {
                name: "Brahmagupta",
                wikiTerm: "Brahmasphutasiddhanta",
                url: "https://en.wikipedia.org/wiki/Brahmasphutasiddhanta",
                topic: "Brahmasphutasiddhanta",
                context: "Formulated the mathematical rules for zero, negative numbers, and solving linear Diophantine equations—the bedrock of modular arithmetic."
              }
            ]
          },
          {
            category: "The Number Theorists",
            items: [
              {
                name: "Pierre de Fermat",
                wikiTerm: "Pierre_de_Fermat",
                url: "https://en.wikipedia.org/wiki/Pierre_de_Fermat",
                topic: "Fermat's Little Theorem",
                context: "Provided the mathematical core for modern prime testing algorithms and modular exponentiation used in RSA."
              },
              {
                name: "Leonhard Euler",
                wikiTerm: "Leonhard_Euler",
                url: "https://en.wikipedia.org/wiki/Leonhard_Euler",
                topic: "Euler's Totient Function (ϕ) & Euler's Theorem",
                context: "The primary engine of the RSA algorithm. Established the mathematical link that allows public and private keys to function as a pair."
              },
              {
                name: "Évariste Galois",
                wikiTerm: "Évariste_Galois",
                url: "https://en.wikipedia.org/wiki/%C3%89variste_Galois",
                topic: "Galois Theory & Finite Fields (GF(p), GF(2^n))",
                context: "Developed the mathematical bedrock on which the Advanced Encryption Standard (AES) and Elliptic Curve Cryptography (ECC) operate."
              }
            ]
          },
          {
            category: "The Modern Math Geniuses",
            items: [
              {
                name: "Srinivasa Ramanujan",
                wikiTerm: "Srinivasa_Ramanujan",
                url: "https://en.wikipedia.org/wiki/Srinivasa_Ramanujan",
                topic: "Number Theory, Partitions, & Modular Forms",
                context: "Reached the absolute peak of pure mathematics. His infinite series and formulas indirectly form the base of modern prime number theory."
              },
              {
                name: "Terence Tao",
                wikiTerm: "Terence_Tao",
                url: "https://en.wikipedia.org/wiki/Terence_Tao",
                topic: "Green-Tao Theorem",
                context: "Proved that prime numbers contain arbitrarily long arithmetic progressions, revealing deep structural patterns within primes."
              },
              {
                name: "Grigori Perelman",
                wikiTerm: "Grigori_Perelman",
                url: "https://en.wikipedia.org/wiki/Grigori_Perelman",
                topic: "Poincaré Conjecture (Topology)",
                context: "Demonstrated the pure ethics of a mathematician by solving a Millennium Prize problem and rejecting the $1M reward. Driven by truth, not profit."
              },
              {
                name: "Agrawal, Kayal, & Saxena (AKS)",
                wikiTerm: "Manindra_Agrawal",
                url: "https://en.wikipedia.org/wiki/Manindra_Agrawal",
                topic: "AKS Primality Test",
                context: "Proved that 'PRIMES is in P'. They created the first unconditional, deterministic polynomial-time algorithm to determine if a number is prime."
              }
            ]
          },
          {
            category: "The Cryptography Pioneers",
            items: [
              {
                name: "Whitfield Diffie & Martin Hellman",
                wikiTerm: "Whitfield_Diffie",
                url: "https://en.wikipedia.org/wiki/Whitfield_Diffie",
                topic: "Diffie-Hellman Key Exchange (DHKE)",
                context: "Invented asymmetric cryptography. Solved the key-exchange problem mathematically without prior shared secrets, and conceptualized Man-in-the-Middle (MitM) attacks.",
                quote: "We stand today on the brink of a revolution in cryptography."
              },
              {
                name: "Rivest, Shamir, & Adleman (RSA)",
                wikiTerm: "Ron_Rivest", 
                url: "https://en.wikipedia.org/wiki/Ron_Rivest",
                topic: "RSA Algorithm",
                context: "Created the first practical implementation of public-key cryptography using prime factorization. Introduced the square and multiply algorithm for efficiency.",
                quote: "Cryptography is usually bypassed, not penetrated."
              },
              {
                name: "Taher Elgamal",
                wikiTerm: "Taher_Elgamal",
                url: "https://en.wikipedia.org/wiki/Taher_Elgamal",
                topic: "ElGamal Encryption",
                context: "Extended DHKE into an encryption system based on the Discrete Logarithm problem. Formed the basis for the US Digital Signature Algorithm (DSA)."
              },
              {
                name: "Joan Daemen & Vincent Rijmen",
                wikiTerm: "Joan_Daemen", 
                url: "https://en.wikipedia.org/wiki/Joan_Daemen",
                topic: "Advanced Encryption Standard (AES / Rijndael)",
                context: "Designed the modern block cipher standard using a Substitution-Permutation Network and Galois Fields, currently securing billions of devices globally."
              },
              {
                name: "Christof Paar",
                wikiTerm: "Christof_Paar",
                url: "https://en.wikipedia.org/wiki/Christof_Paar",
                topic: "Cryptography Education & Side-Channel Attacks",
                context: "Proved that while mathematics might be secure, physical implementations leak keys through power consumption (Power Analysis) or execution time (Timing Attacks).",
                quote: "You don't need to break the math if you can break the implementation."
              }
            ]
          }
        ];

        // --- Intersection Observer Hook ---
        const useScrollReveal = () => {
          const [isVisible, setIsVisible] = useState(false);
          const domRef = useRef();

          useEffect(() => {
            const observer = new IntersectionObserver(entries => {
              entries.forEach(entry => {
                if (entry.isIntersecting) {
                  setIsVisible(true);
                  observer.unobserve(entry.target);
                }
              });
            }, { threshold: 0.1 });

            const currentRef = domRef.current;
            if (currentRef) observer.observe(currentRef);
            return () => { if (currentRef) observer.unobserve(currentRef); };
          }, []);

          return [domRef, isVisible];
        };

        // --- Wikipedia Image Fetcher Component ---
        const WikiImage = ({ wikiTerm, altName, url }) => {
          const [imageUrl, setImageUrl] = useState(null);
          const [loading, setLoading] = useState(true);

          useEffect(() => {
            const fetchImage = async () => {
              try {
                const response = await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${wikiTerm}&prop=pageimages&format=json&pithumbsize=600&origin=*`);
                const data = await response.json();
                const pages = data.query.pages;
                const pageId = Object.keys(pages)[0];
                
                if (pageId !== "-1" && pages[pageId].thumbnail) {
                  setImageUrl(pages[pageId].thumbnail.source);
                } else {
                  setImageUrl(null);
                }
              } catch (error) {
                setImageUrl(null);
              } finally {
                setLoading(false);
              }
            };
            fetchImage();
          }, [wikiTerm]);

          const imageContainerClasses = "w-full md:w-56 h-64 md:h-auto shrink-0 relative rounded-2xl md:rounded-l-3xl md:rounded-r-none overflow-hidden bg-slate-800 flex items-center justify-center group/img block";

          if (loading) {
            return (
              <div className={`${imageContainerClasses} animate-pulse`}>
                 <span className="text-slate-500 text-sm font-medium">Loading...</span>
              </div>
            );
          }

          return (
            <a href={url} target="_blank" rel="noopener noreferrer" className={imageContainerClasses} title={`Read more about ${altName}`}>
              {imageUrl ? (
                <img 
                  src={imageUrl} 
                  alt={altName} 
                  className="w-full h-full object-cover transition-transform duration-700 ease-out group-hover/img:scale-125"
                />
              ) : (
                <UserIcon />
              )}
            </a>
          );
        };

        // --- Timeline Card Component ---
        const TimelineCard = ({ person }) => {
          const [ref, isVisible] = useScrollReveal();

          return (
            <div 
              ref={ref}
              className={`relative w-full mb-12 transition-all duration-700 ease-out transform ${
                isVisible ? "opacity-100 translate-y-0" : "opacity-0 translate-y-12"
              }`}
            >
              <div className="group bg-slate-900/60 backdrop-blur-sm rounded-3xl shadow-xl border border-slate-700 flex flex-col md:flex-row hover:border-cyan-500/50 transition-colors duration-300 overflow-hidden min-w-0">
                
                <WikiImage wikiTerm={person.wikiTerm} altName={person.name} url={person.url} />
                
                <div className="flex-1 p-6 md:p-8 flex flex-col justify-center min-w-0">
                  <div className="flex justify-between items-start mb-4">
                    <h3 className="text-2xl md:text-3xl font-bold text-white group-hover:text-cyan-400 transition-colors duration-300 break-words">
                      {person.name}
                    </h3>
                  </div>
                  
                  <div className="space-y-5 mb-6">
                    <div className="flex items-start">
                      <TopicIcon />
                      <div className="min-w-0">
                        <span className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Concept</span>
                        <span className="text-slate-200 font-medium break-words">{person.topic}</span>
                      </div>
                    </div>
                    
                    <div className="flex items-start">
                      <ImpactIcon />
                      <div className="min-w-0">
                        <span className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Impact</span>
                        <span className="text-slate-400 text-sm leading-relaxed block break-words">{person.context}</span>
                      </div>
                    </div>
                  </div>

                  {person.quote && (
                    <div className="mt-auto pt-5 border-t border-slate-700/50">
                      <div className="flex gap-4 items-start">
                        <QuoteIcon />
                        <p className="text-slate-300 italic font-medium leading-relaxed text-sm break-words">
                          "{person.quote}"
                        </p>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        };

        // --- Main App Component ---
        function App() {
          return (
            <div className="min-h-screen bg-[#0a0f1a] text-slate-300 font-sans overflow-x-hidden selection:bg-cyan-900 selection:text-cyan-100 pb-20">
              
              <div className="fixed inset-0 z-0 pointer-events-none overflow-hidden">
                <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-900/20 rounded-full blur-[120px]"></div>
                <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-emerald-900/10 rounded-full blur-[120px]"></div>
              </div>

              <div className="relative z-10 px-4 md:px-8 max-w-4xl mx-auto">
                <header className="mb-20 mt-16 text-center">
                  <div className="inline-block mb-6 px-4 py-1.5 rounded-full bg-slate-800/80 border border-slate-700 text-cyan-400 text-sm font-bold tracking-widest uppercase shadow-sm">
                    Course Finale
                  </div>
                  <h1 className="text-4xl md:text-6xl font-extrabold text-white tracking-tight mb-6 leading-tight">
                    Cryptography: <br/>
                    <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-indigo-400 to-emerald-400">
                      Math to Machine
                    </span>
                  </h1>
                  <p className="text-lg md:text-xl text-slate-400 max-w-2xl mx-auto leading-relaxed font-light">
                    A journey through time. From the minds who decoded the patterns of numbers, to the pioneers who engineered them into secure systems.
                  </p>
                </header>

                <main className="relative border-l-2 border-slate-800 ml-4 md:ml-0 pl-6 md:pl-12">
                  {pioneersData.map((section, sIdx) => (
                    <div key={sIdx} className="mb-20">
                      
                      <div className="relative mb-10">
                        <div className="absolute -left-[35px] md:-left-[59px] top-1/2 -translate-y-1/2 w-4 h-4 rounded-full bg-cyan-500 shadow-[0_0_10px_rgba(6,182,212,0.8)] border-4 border-[#0a0f1a]"></div>
                        <h2 className="text-2xl font-bold text-white tracking-wide uppercase">
                          {section.category}
                        </h2>
                      </div>
                      
                      <div className="flex flex-col">
                        {section.items.map((person, pIdx) => (
                          <TimelineCard key={pIdx} person={person} />
                        ))}
                      </div>
                      
                    </div>
                  ))}

                  <section className="mt-20 relative rounded-[2rem] overflow-hidden shadow-2xl border border-slate-700">
                    <div className="absolute inset-0 bg-slate-900"></div>
                    <div className="absolute inset-0 bg-gradient-to-br from-indigo-900/40 via-[#0a0f1a] to-emerald-900/30"></div>
                    
                    <div className="relative z-10 p-8 md:p-16 text-center">
                      <div className="inline-block mb-6 px-4 py-2 rounded-full bg-slate-800 border border-slate-600 text-white/90 text-sm font-bold tracking-widest uppercase">
                        The Ultimate Takeaway
                      </div>
                      <h2 className="text-2xl md:text-4xl font-bold mb-6 text-white tracking-tight">
                        Pure Math vs. Flawed Reality
                      </h2>
                      <p className="text-lg md:text-xl leading-relaxed text-slate-300 max-w-2xl mx-auto font-light">
                        "Mathematics has evolved over millennia. From Euclid to AKS, pure math remains flawless. However, vulnerabilities emerge when we implement these concepts on physical machines. A master cryptographer must understand both the pristine mathematics and the flawed machines."
                      </p>
                    </div>
                  </section>
                </main>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
