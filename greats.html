<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryptography Hall of Fame</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { cryptodark: '#050810', cryptocyan: '#00f0ff' } } }
        }
    </script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #050810; margin: 0; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050810; }
        ::-webkit-scrollbar-thumb { background: #00f0ff; border-radius: 10px; }
        
        .tilt-card { transition: transform 0.1s ease-out, box-shadow 0.3s ease; text-decoration: none; }
        .glow-text { text-shadow: 0 0 15px rgba(0, 240, 255, 0.6); }
        .timeline-line { box-shadow: 0 0 15px rgba(0, 240, 255, 0.4); }
        
        @media (min-width: 768px) {
            .tilt-card { transform-style: preserve-3d; display: flex; }
            .tilt-card-inner { transform: translateZ(30px); }
            .img-container { transform-style: preserve-3d; }
            .img-container img { transform: translateZ(15px); }
        }
    </style>
</head>
<body class="text-slate-300 font-sans selection:bg-cyan-900 selection:text-cyan-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // SVG Icons fixed sizes to prevent UI blowout during loading
        const QuoteIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5 text-cyan-400 opacity-60 shrink-0 mt-1"><path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z" /></svg>;
        const TopicIcon = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 mr-3 text-cyan-400 shrink-0"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>;
        const ImpactIcon = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 mr-3 text-emerald-400 shrink-0"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>;
        const UserIcon = () => <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-16 h-16 text-slate-500 mb-2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;

        const chronologicalData = [
          {
            era: "Ancient Foundations (300 BC - 600 AD)",
            items: [
              { year: "~300 BC", name: "Euclid", wikiTerm: "Euclid", url: "https://en.wikipedia.org/wiki/Euclid", topic: "Euclidean & Extended Euclidean Algorithm", context: "Established the mathematical foundation required to compute the Modulo Inverse, crucial for generating the RSA private key (d)." },
              { year: "~276 BC", name: "Eratosthenes", wikiTerm: "Eratosthenes", url: "https://en.wikipedia.org/wiki/Eratosthenes", topic: "Sieve of Eratosthenes", context: "Created the first systematic algorithm for finding prime numbers. This remains the conceptual foundation for RSA prime generation." },
              { year: "~3rd Century", name: "Sun Tzu", wikiTerm: "Sunzi_Suanjing", url: "https://en.wikipedia.org/wiki/Sunzi_Suanjing", topic: "Chinese Remainder Theorem (CRT)", context: "Originated in the Sun Tzu Suanjing. This mathematical theorem is used today to accelerate real-world RSA decryption by roughly 4x." },
              { year: "598 AD", name: "Brahmagupta", wikiTerm: "Brahmagupta", url: "https://en.wikipedia.org/wiki/Brahmagupta", topic: "Brahmasphutasiddhanta", context: "Formulated the mathematical rules for zero, negative numbers, and solving linear Diophantine equations—the bedrock of modular arithmetic." }
            ]
          },
          {
            era: "The Math Theorists (1600 - 1800s)",
            items: [
              { year: "1640", name: "Pierre de Fermat", wikiTerm: "Pierre_de_Fermat", url: "https://en.wikipedia.org/wiki/Pierre_de_Fermat", topic: "Fermat's Little Theorem", context: "Provided the mathematical core for modern prime testing algorithms and modular exponentiation used in RSA." },
              { year: "1736", name: "Leonhard Euler", wikiTerm: "Leonhard_Euler", url: "https://en.wikipedia.org/wiki/Leonhard_Euler", topic: "Euler's Totient Function (ϕ) & Euler's Theorem", context: "The primary engine of the RSA algorithm. Established the mathematical link that allows public and private keys to function as a pair." },
              { year: "1832", name: "Évariste Galois", wikiTerm: "Évariste_Galois", url: "https://en.wikipedia.org/wiki/%C3%89variste_Galois", topic: "Galois Theory & Finite Fields (GF(p), GF(2^n))", context: "Developed the mathematical bedrock on which the Advanced Encryption Standard (AES) and Elliptic Curve Cryptography (ECC) operate." }
            ]
          },
          {
            era: "Birth of Computing (1910s - 1970s)",
            items: [
              { year: "1914", name: "Srinivasa Ramanujan", wikiTerm: "Srinivasa_Ramanujan", url: "https://en.wikipedia.org/wiki/Srinivasa_Ramanujan", topic: "Number Theory, Partitions, & Modular Forms", context: "Reached the absolute peak of pure mathematics. His infinite series and formulas indirectly form the base of modern prime number theory." },
              { year: "1936", name: "Alan Turing", wikiTerm: "Alan_Turing", url: "https://en.wikipedia.org/wiki/Alan_Turing", topic: "Cryptanalysis & The Turing Machine", context: "Cracked the Enigma code during WWII. Laid the theoretical foundation for all modern computing and algorithmic cryptanalysis.", quote: "Machines take me by surprise with great frequency." },
              { year: "1945", name: "John von Neumann", wikiTerm: "John_von_Neumann", url: "https://en.wikipedia.org/wiki/John_von_Neumann", topic: "Von Neumann Architecture & PRNGs", context: "Designed the architecture for modern computers that execute cryptographic algorithms. Also pioneered early pseudo-random number generators (PRNGs).", quote: "Anyone who considers arithmetical methods of producing random digits is, of course, in a state of sin." },
              { year: "1949", name: "Claude Shannon", wikiTerm: "Claude_Shannon", url: "https://en.wikipedia.org/wiki/Claude_Shannon", topic: "Information Theory (Confusion & Diffusion)", context: "Father of Information Theory. His paper established the mathematical principles of confusion and diffusion used in all modern symmetric ciphers.", quote: "Information is the resolution of uncertainty." },
              { year: "1973", name: "Horst Feistel", wikiTerm: "Horst_Feistel", url: "https://en.wikipedia.org/wiki/Horst_Feistel", topic: "The Feistel Network (Lucifer/DES)", context: "Developed the Feistel cipher structure at IBM. This symmetric architecture became the basis for the Data Encryption Standard (DES) and influenced countless block ciphers." }
            ]
          },
          {
            era: "The Crypto Revolution (1976 - 1999)",
            items: [
              { year: "1976", name: "Whitfield Diffie & Martin Hellman", wikiTerm: "Whitfield_Diffie", url: "https://en.wikipedia.org/wiki/Whitfield_Diffie", topic: "Diffie-Hellman Key Exchange (DHKE)", context: "Invented asymmetric cryptography. Solved the key-exchange problem mathematically without prior shared secrets, and conceptualized Man-in-the-Middle (MitM) attacks.", quote: "We stand today on the brink of a revolution in cryptography." },
              { year: "1977", name: "Rivest, Shamir, & Adleman", wikiTerm: "Ron_Rivest", url: "https://en.wikipedia.org/wiki/RSA_(cryptosystem)", topic: "RSA Algorithm", context: "Created the first practical implementation of public-key cryptography using prime factorization. Introduced the square and multiply algorithm for efficiency.", quote: "Cryptography is usually bypassed, not penetrated." },
              { year: "1985", name: "Taher Elgamal", wikiTerm: "Taher_Elgamal", url: "https://en.wikipedia.org/wiki/Taher_Elgamal", topic: "ElGamal Encryption", context: "Extended DHKE into an encryption system based on the Discrete Logarithm problem. Formed the basis for the US Digital Signature Algorithm (DSA)." },
              { year: "1990", name: "Carl Sagan", wikiTerm: "Carl_Sagan", url: "https://en.wikipedia.org/wiki/Carl_Sagan", topic: "The Pale Blue Dot (Perspective)", context: "Before the modern internet boom, reminded humanity of our scale. A philosophical anchor for why we protect data on our fragile, solitary world.", quote: "Look again at that dot. That's here. That's home. That's us." },
              { year: "1994", name: "Peter Shor", wikiTerm: "Peter_Shor", url: "https://en.wikipedia.org/wiki/Peter_Shor", topic: "Shor's Algorithm", context: "Proved that a sufficiently powerful quantum computer can factor large numbers in polynomial time, effectively threatening RSA, ECC, and DHKE.", quote: "If computers that you build are quantum, Then spies of all factions will want 'em." },
              { year: "1996", name: "Lov Grover", wikiTerm: "Lov_Grover", url: "https://en.wikipedia.org/wiki/Lov_Grover", topic: "Grover's Algorithm", context: "Invented a quantum database search algorithm. Forces symmetric ciphers like AES to double their key sizes to maintain security." },
              { year: "1998", name: "Joan Daemen & Vincent Rijmen", wikiTerm: "Joan_Daemen", url: "https://en.wikipedia.org/wiki/Advanced_Encryption_Standard", topic: "Advanced Encryption Standard (AES)", context: "Designed the modern block cipher standard using a Substitution-Permutation Network and Galois Fields, currently securing billions of devices globally." },
              { year: "1999", name: "Christof Paar", wikiTerm: "Christof_Paar", url: "https://en.wikipedia.org/wiki/Christof_Paar", topic: "Side-Channel Attacks", context: "Proved that while mathematics might be secure, physical implementations leak keys through power consumption (Power Analysis) or execution time.", quote: "You don't need to break the math if you can break the implementation." }
            ]
          },
          {
            era: "The Modern Frontier (2000s - Present)",
            items: [
              { year: "2002", name: "Agrawal, Kayal, & Saxena", wikiTerm: "Manindra_Agrawal", url: "https://en.wikipedia.org/wiki/AKS_primality_test", topic: "AKS Primality Test", context: "Proved that 'PRIMES is in P'. They created the first unconditional, deterministic polynomial-time algorithm to determine if a number is prime." },
              { year: "2003", name: "Grigori Perelman", wikiTerm: "Grigori_Perelman", url: "https://en.wikipedia.org/wiki/Grigori_Perelman", topic: "Poincaré Conjecture (Topology)", context: "Demonstrated the pure ethics of a mathematician by solving a Millennium Prize problem and rejecting the $1M reward. Driven by truth, not profit." },
              { year: "2004", name: "Terence Tao", wikiTerm: "Terence_Tao", url: "https://en.wikipedia.org/wiki/Green%E2%80%93Tao_theorem", topic: "Green-Tao Theorem", context: "Proved that prime numbers contain arbitrarily long arithmetic progressions, revealing deep structural patterns within primes." }
            ]
          }
        ];

        // Component to fetch image from Wikipedia API
        const WikiImage = ({ wikiTerm, name, year }) => {
            const [imgUrl, setImgUrl] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchImg = async () => {
                    try {
                        const res = await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${wikiTerm}&prop=pageimages&format=json&pithumbsize=600&origin=*`);
                        const data = await res.json();
                        const pages = data.query.pages;
                        const pageId = Object.keys(pages)[0];
                        if (pageId !== "-1" && pages[pageId].thumbnail) {
                            setImgUrl(pages[pageId].thumbnail.source);
                        }
                    } catch (e) {
                        console.error("Image fetch failed for", wikiTerm);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchImg();
            }, [wikiTerm]);

            return (
                <div className="img-container w-full md:w-64 h-56 md:h-auto shrink-0 relative bg-[#0a0f1a] flex flex-col items-center justify-center border-b md:border-b-0 md:border-r border-slate-700/50 rounded-t-2xl md:rounded-l-2xl md:rounded-tr-none overflow-hidden">
                    {loading ? (
                        <div className="animate-pulse text-slate-600 text-sm font-medium">Scanning...</div>
                    ) : imgUrl ? (
                        <img src={imgUrl} alt={name} className="w-full h-full object-cover object-top transition-transform duration-500 ease-out group-hover:scale-[1.03] opacity-80 group-hover:opacity-100 absolute inset-0 mix-blend-luminosity md:group-hover:mix-blend-normal" />
                    ) : (
                        <img src={`https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=0a0f1a&color=00f0ff&size=512&font-size=0.33`} alt={name} className="w-full h-full object-cover opacity-60 absolute inset-0" />
                    )}
                    <div className="absolute top-3 left-3 bg-cryptodark/80 px-2 py-1 rounded text-xs font-mono text-cyan-400 border border-cyan-500/30 z-10">{year}</div>
                </div>
            );
        };

        const CanvasBackground = () => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationFrameId;
                let particles = [];
                let mouse = { x: null, y: null, radius: 120 };

                const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; init(); };
                window.addEventListener('resize', resize);
                window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
                window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });

                class Particle {
                    constructor() {
                        this.x = Math.random() * canvas.width;
                        this.y = Math.random() * canvas.height;
                        this.size = Math.random() * 1.5 + 0.5;
                        this.speedX = Math.random() * 0.5 - 0.25;
                        this.speedY = Math.random() * 0.5 - 0.25;
                    }
                    update() {
                        this.x += this.speedX; this.y += this.speedY;
                        if (this.x > canvas.width || this.x < 0) this.speedX = -this.speedX;
                        if (this.y > canvas.height || this.y < 0) this.speedY = -this.speedY;

                        if (mouse.x && mouse.y) {
                            let dx = mouse.x - this.x; let dy = mouse.y - this.y;
                            let distance = Math.sqrt(dx * dx + dy * dy);
                            if (distance < mouse.radius) {
                                const force = (mouse.radius - distance) / mouse.radius;
                                this.x -= (dx / distance) * force * 2;
                                this.y -= (dy / distance) * force * 2;
                            }
                        }
                    }
                    draw() {
                        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(0, 240, 255, 0.4)'; ctx.fill();
                    }
                }

                const init = () => {
                    particles = [];
                    const numParticles = (canvas.width * canvas.height) / 15000;
                    for (let i = 0; i < numParticles; i++) particles.push(new Particle());
                };

                const animate = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    for (let i = 0; i < particles.length; i++) {
                        particles[i].update(); particles[i].draw();
                        for (let j = i; j < particles.length; j++) {
                            const dx = particles[i].x - particles[j].x;
                            const dy = particles[i].y - particles[j].y;
                            const distance = Math.sqrt(dx * dx + dy * dy);
                            if (distance < 120) {
                                ctx.beginPath();
                                ctx.strokeStyle = `rgba(0, 240, 255, ${0.8 - distance / 120})`;
                                ctx.lineWidth = 0.5;
                                ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.stroke();
                            }
                        }
                    }
                    animationFrameId = requestAnimationFrame(animate);
                };

                resize(); animate();
                return () => { window.removeEventListener('resize', resize); cancelAnimationFrame(animationFrameId); };
            }, []);
            return <canvas ref={canvasRef} className="fixed inset-0 z-0 opacity-50 pointer-events-none" />;
        };

        const ProgressBar = () => {
            const [scrollPct, setScrollPct] = useState(0);
            useEffect(() => {
                const handleScroll = () => {
                    const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
                    const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                    setScrollPct((winScroll / height) * 100);
                };
                window.addEventListener("scroll", handleScroll);
                return () => window.removeEventListener("scroll", handleScroll);
            }, []);
            return (
                <div className="fixed top-0 left-0 h-1 bg-cyan-900 w-full z-50">
                    <div className="h-full bg-cyan-400 timeline-line transition-all duration-150 ease-out" style={{ width: `${scrollPct}%` }}></div>
                </div>
            );
        };

        const useScrollReveal = () => {
          const [isVisible, setIsVisible] = useState(false);
          const domRef = useRef();
          useEffect(() => {
            const observer = new IntersectionObserver(entries => {
              entries.forEach(entry => { if (entry.isIntersecting) { setIsVisible(true); observer.unobserve(entry.target); } });
            }, { threshold: 0.1 });
            if (domRef.current) observer.observe(domRef.current);
            return () => { if (domRef.current) observer.unobserve(domRef.current); };
          }, []);
          return [domRef, isVisible];
        };

        const TimelineCard = ({ person }) => {
          const [ref, isVisible] = useScrollReveal();
          const cardRef = useRef(null);

          const handleMouseMove = useCallback((e) => {
            if (!cardRef.current || window.innerWidth < 768) return; 
            const rect = cardRef.current.getBoundingClientRect();
            const x = e.clientX - rect.left; const y = e.clientY - rect.top;
            const centerX = rect.width / 2; const centerY = rect.height / 2;
            const rotateX = ((y - centerY) / centerY) * -4;
            const rotateY = ((x - centerX) / centerX) * 4;
            cardRef.current.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
            cardRef.current.style.boxShadow = `${-rotateY}px ${rotateX}px 25px rgba(0, 240, 255, 0.15)`;
          }, []);

          const handleMouseLeave = useCallback(() => {
            if (!cardRef.current || window.innerWidth < 768) return;
            cardRef.current.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
            cardRef.current.style.boxShadow = `none`;
          }, []);

          return (
            <div ref={ref} className={`relative w-full mb-12 transition-all duration-1000 ease-out transform ${isVisible ? "opacity-100 translate-y-0" : "opacity-0 translate-y-24"}`}>
              {/* Outer element is an anchor tag to make entire card clickable */}
              <a 
                href={person.url} target="_blank" rel="noopener noreferrer"
                ref={cardRef} onMouseMove={handleMouseMove} onMouseLeave={handleMouseLeave}
                className="tilt-card bg-slate-900/50 backdrop-blur-lg rounded-2xl border border-slate-700/60 hover:border-cyan-400/60 min-w-0 group flex-col md:flex-row cursor-pointer"
              >
                
                <WikiImage wikiTerm={person.wikiTerm} name={person.name} year={person.year} />
                
                <div className="tilt-card-inner flex-1 p-6 md:p-8 flex flex-col justify-center text-slate-300">
                  <h3 className="text-2xl md:text-3xl font-extrabold text-white mb-5 tracking-tight drop-shadow-md group-hover:text-cyan-300 transition-colors">{person.name}</h3>
                  <div className="space-y-4 mb-5">
                    <div className="flex items-start">
                      <TopicIcon />
                      <div className="min-w-0">
                        <span className="block text-xs font-bold text-cyan-500 uppercase tracking-widest mb-1">Concept</span>
                        <span className="text-slate-200 font-medium text-[15px] md:text-base leading-snug">{person.topic}</span>
                      </div>
                    </div>
                    <div className="flex items-start">
                      <ImpactIcon />
                      <div className="min-w-0">
                        <span className="block text-xs font-bold text-emerald-500 uppercase tracking-widest mb-1">Impact</span>
                        <span className="text-slate-400 text-sm md:text-[15px] leading-relaxed block">{person.context}</span>
                      </div>
                    </div>
                  </div>
                  {person.quote && (
                    <div className="mt-auto pt-4 border-t border-slate-700/50 flex gap-3 items-start">
                      <QuoteIcon />
                      <p className="text-slate-300 italic font-medium text-sm md:text-[15px] leading-relaxed drop-shadow-sm">"{person.quote}"</p>
                    </div>
                  )}
                </div>
              </a>
            </div>
          );
        };

        function App() {
          return (
            <>
              <ProgressBar />
              <CanvasBackground />
              
              <div className="relative z-10 px-4 md:px-8 max-w-5xl mx-auto pb-32">
                <header className="mb-24 mt-20 text-center">
                  <div className="inline-block mb-6 px-6 py-2 rounded-full bg-slate-900/80 border border-cyan-500/30 text-cyan-400 text-sm font-bold tracking-[0.2em] uppercase timeline-line backdrop-blur-md">
                    Chronological Journey
                  </div>
                  <h1 className="text-4xl md:text-7xl font-black text-white tracking-tighter mb-6 leading-tight">
                    Cryptography: <br/>
                    <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-emerald-400 glow-text">
                      Math to Machine
                    </span>
                  </h1>
                  <p className="text-lg md:text-xl text-slate-400 max-w-3xl mx-auto leading-relaxed font-light">
                    From ancient geometry to quantum algorithms. A chronological look at the pioneers who built the foundations of secure communication. Click any card to read more on Wikipedia.
                  </p>
                </header>

                <main className="relative border-l border-slate-800 ml-4 md:ml-8 pl-6 md:pl-16">
                  {chronologicalData.map((eraBlock, sIdx) => (
                    <div key={sIdx} className="mb-20">
                      <div className="relative mb-10">
                        <div className="absolute -left-[33px] md:-left-[73px] top-1/2 -translate-y-1/2 w-4 h-4 rounded-full bg-cyan-400 timeline-line border-2 border-cryptodark"></div>
                        <h2 className="text-xl md:text-2xl font-bold text-white tracking-widest uppercase opacity-90 drop-shadow-md">
                          {eraBlock.era}
                        </h2>
                      </div>
                      
                      <div className="flex flex-col">
                        {eraBlock.items.map((person, pIdx) => (
                          <TimelineCard key={pIdx} person={person} />
                        ))}
                      </div>
                    </div>
                  ))}

                  <section className="mt-32 relative rounded-3xl overflow-hidden shadow-[0_0_40px_rgba(0,240,255,0.1)] border border-slate-800">
                    <div className="absolute inset-0 bg-gradient-to-br from-slate-900 via-cryptodark to-cyan-900/20"></div>
                    <div className="relative z-10 p-8 md:p-16 text-center">
                      <div className="inline-block mb-6 px-4 py-2 rounded-full bg-slate-900/50 border border-slate-700 text-cyan-300 text-xs font-bold tracking-widest uppercase">
                        The Ultimate Takeaway
                      </div>
                      <h2 className="text-3xl md:text-4xl font-extrabold mb-6 text-white tracking-tight">
                        Pure Math vs. Flawed Reality
                      </h2>
                      <p className="text-lg md:text-xl leading-relaxed text-slate-400 max-w-3xl mx-auto font-light">
                        "Mathematics has evolved over millennia. From Euclid to Shor, pure math remains flawless. However, vulnerabilities emerge when we implement these concepts on physical machines. A master cryptographer must understand both the pristine mathematics and the flawed machines."
                      </p>
                    </div>
                  </section>
                </main>
              </div>
            </>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
